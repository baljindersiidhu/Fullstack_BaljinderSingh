<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrapper">

        <h1>Weather App</h1>
        <div class="tab-container">
            <div class="tab" data-userweather>Your Weather</div>
            <div class="tab" data-search-weather>Search Weather</div>
        </div>

        <div class="weather-container">
                <!-- grant location -->
                 <div class="sub-conainer grant-location-container">

                    <img src="location-svgrepo-com.svg" alt="" width="80" height="80" loading="lazy">
                    <p>Grant location access</p>
                    <p>allow access to give share location</p>
                    <button class="btn" data-grantAccess>Grant Access </button>
                </div>

                <!-- search form -->
                <form action="" class="form-container" data-searchForm >
                    <input type="text" placeholder="Search for City..." data-search-input>
                    <button class="btn" type="submit">
                        <img src="search-button-svgrepo-com.svg" alt="" width="20" height="20" loading="lazy">
                    </button>
                </form>

                <!-- loading screen container -->
                <div class="sub-conainer loading-container">
                    <img src="gear-spinner.svg" width="150" height="150">
                    <p>Loading....</p>
                </div>

                <!-- show weather info -->

                <div class="sub-conainer user-info-container">
                        <!-- city and flag -->
                    <div class="name">
                        <p data-cityName></p>
                        <img data-countryIcon>
                    </div>

<!-- weather description -->
                    <p data-weatherDesc></p>
                    <!-- weather icon -->
                    <img data-weatherIcon class="desc-img">
                    <!-- temperature -->
                    <p data-temp  ></p>

                    <!-- 3 cars parameters -->
                        <div class="parameter-container">

                            <!-- card 1 -->
                             <div class="parameter">
                                <img src="wind-svgrepo-com.svg" width="80">
                                <p>windspeed</p>
                                <p data-windspeed></p>
                             </div>

                             <!-- card 2 -->
                              <div class="parameter">
                                <img src="humidity.png" width="80"> 
                                <p>Humidity</p>
                                <p data-humidity></p>
                             </div>

                             <!-- card 3 -->

                             <div class="parameter">
                                <img src="clouds-cloud-svgrepo-com.svg" width="80" >
                                <p>Clouds</p>
                                <p data-cloudiness></p>
                             </div>

                        </div>

                </div>

                <div class="error-img">
                    <img src="404-error.png"  alt="">
                </div>

        </div>

    </div>
    

    <script src="script.js"></script>
</body>
</html>
