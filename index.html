<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
   <!-- wrapper -->
    <section class="w-1080px w-10/11 mx-auto p-10">

        <!-- Navigation bar -->
        <nav class=" flex flex-row justify-evenly items-center text-center">
           <a href="#"> <img src="logo.png" alt="" class="w-24"></a>

           <div class="flex ">
            <ul class="flex justify-between gap-8  items-center text-center">
                <li class="font-medium ">Jobs  <i class="fa-solid fa-envelope"></i></li>
                <li class="font-medium ">Jobs Prep <button class="bg-[rgb(255,106,63)]  text-white p-1
                    px-3 rounded-md">New</button></li>
                <li class="font-medium ">Contest <button class="bg-[rgb(255,106,63)] px-3 rounded-md text-white  p-1">New</button></li>
                <li class="font-medium ">Degree <button class="bg-[rgb(255,106,63)] px-3 rounded-md text-white  p-1">New</button></li>
                 <li class="font-medium text-center  ">Resume Tools <i class="fa-solid fa-envelope"></i></li>
            </ul>
           </div>

           <!-- login button -->
           <div class=" flex flex-row gap-6">
            <button class="text-[rgb(42,136,112)]
             font-medium">Employer Login</button>
            <button class="bg-[rgb(42,136,112)] px-5 py-2 rounded-md font-medium text-white hover:bg-white hover:text-[rgb(42,136,112)] duration-200 border-2 border-[rgb(42,136,112)]">Candidate Login</button>
           </div>

         


        </nav>
        </section>

        <!-- hero section -->
         <div class=" w-full mx-auto flex mt-14 bg-gradient-to-b from-[#FAF8F9] via-[#F6F4F7] to-[#EEF1F7] relative flex justify-between">

            <!-- left hero section  -->
         <div class=" flex flex-col gap-5 mx-5 w-[70%] ">
            <h3 class="font-bold text-[rgb(42,136,112)] text-2xl">INDIA’S #1 JOB PLATFORM</h3>
            <h1 class="font-bold text-6xl">Your job search ends here</h1>
            <h3 class=" text-3xl">Discover 50 lakh+ career opportunities</h3>

            <!-- SEARCH SECTION -->
             <div>
                <div class="max-w-[800px] mx-auto mt-8">
  <div class="flex items-center bg-white rounded-2xl shadow-sm px-4 py-3 gap-3">

    <!-- Job Title -->
    <div class="flex items-center gap-2 flex-1 text-gray-500">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        type="text"
        placeholder="Search jobs by 'title'"
        class="w-full outline-none text-gray-700 placeholder-gray-400"
      />
    </div>

    <!-- Divider -->
    <div class="h-6 w-px bg-gray-200"></div>

    <!-- Experience -->
    <div class="flex items-center gap-2 flex-1 text-gray-500">
      <i class="fa-solid fa-briefcase"></i>
      <select class="w-full outline-none bg-transparent text-gray-700">
        <option>Your Experience</option>
        <option>0–1 years</option>
        <option>1–3 years</option>
        <option>3+ years</option>
      </select>
    </div>

    <!-- Divider -->
    <div class="h-6 w-px bg-gray-200"></div>

    <!-- Location -->
    <div class="flex items-center gap-2 flex-1 text-gray-500">
      <i class="fa-solid fa-location-dot"></i>
      <input
        type="text"
        placeholder="Search for an area or city"
        class="w-full outline-none text-gray-700 placeholder-gray-400"
      />
    </div>

    <!-- Button -->
    <button class="bg-[#2A8870] hover:bg-[#23725E] text-white px-6 py-3 rounded-xl font-semibold">
      Search jobs
    </button>

  </div>
</div>


             </div>

            <h4 class="font-bold text-2xl">Proud to Support</h4>

             <!-- image section  -->
              <div class=" flex flex-row w-1080px gap-14">
               
                <img class="h-20" src="ministry-of-labour-and-employment-logo.avif" alt="">
             <img class="h-20" src="seeklogo.avif" alt="">
                <img class="h-20" src="DPIIT-header-new.webp" alt=""> 
            </div>

            <h3 class="font-bold text-2xl">Trusted by 1000+ enterprises and 7 lakh+ MSMEs for hiring</h3>


         </div>
         
         <!-- right hero section -->
          <div class="flex flex-col ">
            <img class="h-[400px] absolute right-0 bottom-0 " src="ApnaHeroNew.png" alt="">
          </div>


         </div>
</body>
</html>
