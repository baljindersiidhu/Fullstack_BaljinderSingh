<h3>Add and Remove List Items</h3>

<button onclick="addItem()">Add Item</button>
<button onclick="removeItem()">Remove Last Item</button>

<ul id="itemList">
</ul>

<script>

function addItem(){

    let li = document.createElement("li");

    let list = document.getElementById("itemList");

}
